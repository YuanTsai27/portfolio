<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Sensor System — Yuan Tsai</title>
  <style>
    :root {
      --bg: #f5f5fa;
      --bg-card: #ffffff;
      --bg-nav: rgba(245, 245, 250, 0.85);
      --border: #e0e0f0;
      --text: #1a1a2e;
      --text-muted: #6666aa;
      --accent: #5a45e8;
      --accent-hover: #7c6af7;
      --accent-glow: rgba(90, 69, 232, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back svg { width: 16px; height: 16px; }
    .nav-title {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.01em;
    }
    .nav-title span { color: var(--accent); }

    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 96px 2rem 5rem;
    }

    .project-header {
      margin-bottom: 2.5rem;
    }
    .project-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .project-header h1 span { color: var(--accent); }

    .project-body {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .description {
      font-size: 1rem;
      color: var(--text);
      max-width: 620px;
    }
    .description p + p { margin-top: 0.75rem; }

    /* Media grid */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .media-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/10;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .media-item img,
    .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .page { padding: 80px 1.25rem 4rem; }
      .media-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="projects.html" class="nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    Projects
  </a>
  <span class="nav-title">Yuan <span>Tsai</span></span>
  <div></div>
</nav>

<div class="page">
  <div class="project-header">
    <h1>Motion Sensor <span>System</span></h1>
  </div>

  <div class="project-body">

    <div class="description">
      <p>Add your project description here.</p>
    </div>

    <!-- Add images/videos below. Example:
    <div class="media-grid">
      <div class="media-item"><img src="your-image.jpg" alt="Description"></div>
      <div class="media-item"><video src="your-video.mp4" controls></video></div>
    </div>
    -->

  </div>
</div>

</body>
</html>
