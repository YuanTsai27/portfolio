<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuan's Test Portfolio</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0f0f13;
      --bg-card: #1a1a24;
      --bg-nav: rgba(15, 15, 19, 0.85);
      --border: #2a2a3a;
      --text: #e8e8f0;
      --text-muted: #8888a8;
      --accent: #7c6af7;
      --accent-hover: #9d8fff;
      --accent-glow: rgba(124, 106, 247, 0.2);
      --tag-bg: #23233a;
    }
    :root[data-theme="light"] {
      --bg: #f5f5fa;
      --bg-card: #ffffff;
      --bg-nav: rgba(245, 245, 250, 0.85);
      --border: #e0e0f0;
      --text: #1a1a2e;
      --text-muted: #6666aa;
      --accent: #5a45e8;
      --accent-hover: #7c6af7;
      --accent-glow: rgba(90, 69, 232, 0.15);
      --tag-bg: #ebebf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      line-height: 1.6;
    }


    /* SECTIONS */
    main { padding-top: 0; }

    /* ABOUT */
    .about-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: 12vh;
      max-width: 900px;
      margin: 0 auto;
    }
    .about-hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }
    .about-hero h1 span { color: var(--accent); }
    .about-hero .occupation {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.5s ease, opacity 0.5s ease;
      transform-origin: center bottom;
    }
    .about-hero .university {
      font-size: 0.9rem;
      color: var(--text-muted);
      opacity: 0.7;
      margin-bottom: 1.75rem;
      transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.5s ease, opacity 0.5s ease;
      transform-origin: center bottom;
    }
    .about-hero .occupation.featured {
      transform: scale(1.35) translateY(1.6rem);
      color: var(--text);
      opacity: 1;
    }
    .about-hero .university.featured {
      transform: scale(1.15) translateY(2.4rem);
      opacity: 1;
      color: var(--text-muted);
    }
    .hobby-rotator {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 600;
      min-height: 1.5em;
      margin-bottom: 2.5rem;
      transition: opacity 0.6s ease;
    }
    .btn-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .contact-line {
      margin-top: 1.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .contact-line a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .contact-line a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      border-radius: 0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }



    /* CORNER PHOTOS */
    .corner-photo {
      position: fixed;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
    }
    .corner-photo img {
      width: 240px;
      height: 240px;
      object-fit: cover;
      border-radius: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: block;
    }
    .corner-photo.top-left     { top: 5rem;    left: 2rem;   }
    .corner-photo.top-right    { top: 5rem;    right: 2rem;  }
    .corner-photo.bottom-left  { bottom: 2rem; left: 2rem;   }
    .corner-photo.bottom-right { bottom: 2rem; right: 2rem;  }
    .corner-photo.visible { opacity: 1; }

    @media (max-width: 640px) {
      .corner-photo img { width: 90px; height: 90px; border-radius: 0; }
      .corner-photo.top-left, .corner-photo.top-right { top: 1rem; }
      .corner-photo.top-left, .corner-photo.bottom-left { left: 0.75rem; }
      .corner-photo.top-right, .corner-photo.bottom-right { right: 0.75rem; }
      .about-hero { padding-bottom: 8vh; }
      .section { padding: 3rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="corner-photo" id="corner-photo"><img id="corner-img" src="" alt=""></div>

<main>

  <!-- ABOUT -->
  <div id="tab-about" class="section active">
    <div class="about-hero">
      <h1>Yuan <span>Tsai</span></h1>
      <p class="occupation">Mechatronics Engineering Student</p>
      <p class="university">Part III at The University of Auckland</p>
      <p class="hobby-rotator" id="hobby-rotator">Badminton Player</p>
      <div class="btn-group">
        <a href="projects.html" class="btn btn-primary">Projects</a>
      </div>
      <p class="contact-line">Contact me at my <a href="https://www.linkedin.com/in/yuan-tsai-aa14a11a4/" target="_blank" rel="noopener">LinkedIn</a> or <a href="mailto:yuantsainz@gmail.com">Email</a></p>
    </div>
  </div>



</main>

<script>
  // Hobby rotator + corner photos
  const hobbies = ['Badminton Player', 'Outdoor Runner', 'Clumsy Skier', 'Challenger', 'Strawberry Lover'];
  // corner: top-left, top-right, bottom-left, bottom-right
  // Mechatronics shown during the featured intro (between last hobby and Badminton)
  const hobbyPhotos = [
    { src: 'badminton.jpg',       corner: 'top-right'    },
    { src: 'outdoor running.jpg', corner: 'bottom-left'  },
    { src: 'clumsy skier.jpg',    corner: 'top-right'    },
    { src: 'challenger.jpg',      corner: 'bottom-right' },
    { src: 'strawberry.jpg',      corner: 'bottom-left'  },
  ];
  const mechatronicsPhoto = { src: 'mechatronics.jpg', corner: 'top-left' };

  let hobbyIndex = 0;
  const hobbyEl    = document.getElementById('hobby-rotator');
  const occupationEl = document.querySelector('.occupation');
  const universityEl = document.querySelector('.university');
  const cornerEl   = document.getElementById('corner-photo');
  const cornerImg  = document.getElementById('corner-img');
  const corners    = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];

  function showPhoto(photoObj) {
    // Fade out current
    cornerEl.classList.remove('visible');
    setTimeout(() => {
      corners.forEach(c => cornerEl.classList.remove(c));
      cornerImg.src = photoObj.src;
      cornerEl.classList.add(photoObj.corner);
      cornerEl.classList.add('visible');
    }, 400);
  }

  function hidePhoto() {
    cornerEl.classList.remove('visible');
  }

  function cycleHobby() {
    hobbyEl.style.opacity = '0';
    hidePhoto();
    setTimeout(() => {
      hobbyIndex = (hobbyIndex + 1) % hobbies.length;
      if (hobbyIndex === 0) {
        // Feature the title text + show Mechatronics photo
        occupationEl.classList.add('featured');
        universityEl.classList.add('featured');
        showPhoto(mechatronicsPhoto);
        setTimeout(() => {
          occupationEl.classList.remove('featured');
          universityEl.classList.remove('featured');
          hidePhoto();
          setTimeout(() => {
            hobbyEl.textContent = hobbies[hobbyIndex];
            hobbyEl.style.opacity = '1';
            showPhoto(hobbyPhotos[hobbyIndex]);
            setTimeout(cycleHobby, 3000);
          }, 700);
        }, 2200);
      } else {
        hobbyEl.textContent = hobbies[hobbyIndex];
        hobbyEl.style.opacity = '1';
        showPhoto(hobbyPhotos[hobbyIndex]);
        setTimeout(cycleHobby, 3000);
      }
    }, 600);
  }

  // Start with Mechatronics featured moment, then begin hobby cycle
  function startSequence() {
    hobbyEl.style.opacity = '0';
    occupationEl.classList.add('featured');
    universityEl.classList.add('featured');
    showPhoto(mechatronicsPhoto);
    setTimeout(() => {
      occupationEl.classList.remove('featured');
      universityEl.classList.remove('featured');
      hidePhoto();
      setTimeout(() => {
        hobbyEl.textContent = hobbies[0];
        hobbyEl.style.opacity = '1';
        showPhoto(hobbyPhotos[0]);
        setTimeout(cycleHobby, 3000);
      }, 700);
    }, 2200);
  }
  setTimeout(startSequence, 800);




</script>

</body>
</html>
